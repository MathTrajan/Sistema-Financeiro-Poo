# Banco de dados PostgreSQL
# Crie o banco "financeiro_db" e ajuste usuario/senha conforme sua instalacao local
spring.datasource.url=jdbc:postgresql://localhost:5432/financeiro_db
spring.datasource.username=postgres
spring.datasource.password=SUA_SENHA_AQUI

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Datas e horários em JSON no formato ISO (ex: "2025-04-29")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Thymeleaf (template HTML)
spring.thymeleaf.cache=false
